apiVersion: v1
kind: ConfigMap
metadata:
  name: nemorosa-bootstrap
  namespace: nemorosa
data:
  render-and-start.sh: |
    #!/bin/sh
    set -eu

    python -c '
    import os
    import textwrap
    from pathlib import Path

    qbit_username = os.environ["QBIT_USERNAME"]
    qbit_password = os.environ["QBIT_PASSWORD"]
    qbit_host = os.environ.get("QBIT_HOST", "qbittorrent.qbittorrent.svc.cluster.local")
    qbit_port = os.environ.get("QBIT_PORT", "10095")
    api_key = os.environ.get("NEMOROSA_APIKEY", "").strip()
    red_apikey = os.environ["RED_APIKEY"]
    ops_apikey = os.environ["OPS_APIKEY"]
    dic_session = os.environ["DIC_SESSION"]
    lztr_session = os.environ["LZTR_SESSION"]
    ggn_apikey = os.environ["GGN_APIKEY"]
    jpop_cookie = os.environ["JPOP_SESSION"]
    if "=" not in dic_session:
        dic_session = f"session={dic_session}"
    if "=" not in lztr_session:
        lztr_session = f"session={lztr_session}"

    config_dir = Path("/app/data/nemorosa")
    config_dir.mkdir(parents=True, exist_ok=True)
    Path("/medias/downloads/complete/-nemorosa-link").mkdir(parents=True, exist_ok=True)

    schema_marker = config_dir / ".db-schema-0.5.0"
    if not schema_marker.exists():
        for db_path in (config_dir / "nemorosa.db", config_dir / "nemorosa.db-shm", config_dir / "nemorosa.db-wal"):
            db_path.unlink(missing_ok=True)
        schema_marker.write_text("0.5.0\n", encoding="utf-8")

    server_api_key = "null" if not api_key else f"\"{api_key}\""
    config = textwrap.dedent(
        f"""
        global:
          loglevel: info
          no_download: false
          exclude_mp3: true
          check_trackers:
            - "flacsfor.me"
            - "home.opsfet.ch"
            - "52dic.vip"
            - "tracker.lztr.me"
            - "tracker.gazellegames.net"
            - "jpopsuki.eu"
          check_music_only: true
          auto_start_torrents: true
          notification_urls: []

        linking:
          enable_linking: true
          link_dirs:
            - "/medias/downloads/complete/-nemorosa-link"
          link_type: "hardlink"

        server:
          host: null
          port: 8256
          api_key: {server_api_key}
          search_cadence: "1 day"
          cleanup_cadence: "1 day"

        downloader:
          - type: "qbittorrent"
            url: "http://{qbit_host}:{qbit_port}/"
            username: "{qbit_username}"
            password: "{qbit_password}"
            torrents_dir: ""
            label: "nemorosa-link"
            tags:
              - "nemorosa-link"
            use_unified_labels: true
            duplicate_categories: false

        target_site: []
        """
    ).lstrip()

    target_sites = textwrap.dedent(
        f"""
        target_site:
          - server: "https://redacted.sh"
            api_key: "{red_apikey}"
          - server: "https://orpheus.network"
            api_key: "{ops_apikey}"
          - server: "https://dicmusic.com"
            cookie: "{dic_session}"
          - server: "https://lztr.me"
            cookie: "{lztr_session}"
          - server: "https://gazellegames.net"
            api_key: "{ggn_apikey}"
          - server: "https://jpopsuki.eu"
            cookie: "{jpop_cookie}"
        """
    )

    (config_dir / "config.yml").write_text(config.replace("target_site: []", target_sites), encoding="utf-8")
    '

    nemorosa --config /app/data/nemorosa/config.yml
    exec nemorosa --server --config /app/data/nemorosa/config.yml
