apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbitmanage
  namespace: qbitmanage
spec:
  interval: 15m
  chart:
    spec:
      chart: qbitmanage
      version: 12.2.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    service:
      main:
        enabled: true
        ports:
          main:
            enabled: true
            port: 8080
    ingress:
      main:
        enabled: true
        hosts:
          - host: "qbitmanage.${DOMAIN_0}"
            paths:
              - path: /
                pathType: Prefix
        integrations:
          nginx:
            enabled: true
            auth:
              type: authelia
              internalHost: authelia.authelia.svc.cluster.local:9091
              externalHost: auth.${DOMAIN_0}
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
          homepage:
            enabled: true
            group: Downloads
            name: qBit Manage
            description: qBittorrent automation manager
            widget:
              enabled: false
    credentials:
      minio:
        name: minio
        type: s3
        path: ""
        accessKey: "${MINIO_ID}"
        bucket: "${MINIO_BUCKET}"
        encrKey: "${MINIO_ENCR_KEY}"
        secretKey: "${MINIO_KEY}"
        url: "${MINIO_URL}"
    persistence:
      config:
        volsync:
          - name: config
            type: restic
            credentials: minio
            cleanupCachePVC: true
            dest:
              enabled: true
            src:
              enabled: true
              trigger:
                schedule: 30 9 * * *
      data:
        enabled: true
        type: nfs
        mountPath: /medias
        path: ${NFS_MEDIAS_PATH}
        server: ${NFS_SERVER}
    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                QBT_WEB_SERVER: "true"
                QBT_HOST: 0.0.0.0
                QBT_PORT: 8080
                QBT_SCHEDULE: 1440
                QBT_CONFIG: /config/config.yml
