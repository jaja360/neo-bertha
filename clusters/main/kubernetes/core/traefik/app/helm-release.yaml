            #       authResponseHeadersRegex: ""
            #       name: auth
            #       tls:
            #         insecureSkipVerify: false
            #       trustForwardHeader: true
        service:
            main:
                type: ClusterIP
            tcp:
                loadBalancerIP: ""
                externalTrafficPolicy: Local
                ports:
                    web:
                        enabled: true
                        port: 80
                        protocol: http
                        redirectTo: websecure
                    websecure:
                        enabled: true
                        port: 443
                        protocol: https
